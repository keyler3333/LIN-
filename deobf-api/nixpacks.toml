[phases.setup]
nixPkgs = ["lua5_1", "nodejs", "nodePackages.npm", "git"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "git clone https://github.com/nicowillis/Lua-Deobfuscator /app/Lua-Deobfuscator || true",
    "cd /app/Lua-Deobfuscator && npm install"
]

[start]
cmd = "python api.py"
