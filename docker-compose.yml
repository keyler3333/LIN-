services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - UNLUAC_PATH=/opt/unluac.jar
      - API_KEY=${API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ./deobf-bot
      dockerfile: Dockerfile
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DEOBF_API_URL=http://api:5000
      - API_KEY=${API_KEY}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
