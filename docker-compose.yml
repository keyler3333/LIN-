version: '3'
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - UNLUAC_PATH=/opt/unluac.jar
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped

  bot:
    build:
      context: ./deobf-bot
      dockerfile: Dockerfile
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DEOBF_API_URL=http://api:5000
      - GROQ_API_KEY=${GROQ_API_KEY}
    restart: unless-stopped
    depends_on:
      - api
