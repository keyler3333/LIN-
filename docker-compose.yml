version: '3.8'
services:
  api:
    build: ./deobf-api
    environment:
      - LUA_BIN=lua5.1
      - PORT=5000
    ports:
      - "5000:5000"
    restart: unless-stopped

  bot:
    build: ./deobf-bot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DEOBF_API_URL=http://api:5000
    depends_on:
      - api
    restart: unless-stopped
